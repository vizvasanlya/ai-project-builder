<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Project Builder - Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Project Builder</h1>
      <p>Automated project generation and deployment</p>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="projects">Projects</button>
      <button class="tab" data-tab="config">Configuration</button>
      <button class="tab" data-tab="models">Models</button>
    </nav>

    <main id="content">
      <div id="overview" class="tab-content active">
        <div class="stats-grid">
          <div class="stat-card">
            <h3>Total Projects</h3>
            <p id="stat-total">0</p>
          </div>
          <div class="stat-card success">
            <h3>Completed</h3>
            <p id="stat-completed">0</p>
          </div>
          <div class="stat-card warning">
            <h3>In Progress</h3>
            <p id="stat-pending">0</p>
          </div>
          <div class="stat-card error">
            <h3>Failed</h3>
            <p id="stat-failed">0</p>
          </div>
        </div>

        <div class="section">
          <h2>Recent Projects</h2>
          <div id="recent-projects" class="project-list"></div>
        </div>

        <div class="section">
          <h2>Live Activity</h2>
          <div id="activity-feed" class="project-list"></div>
        </div>

        <div class="section">
          <h2>API Usage (Last 7 Days)</h2>
          <div id="api-usage" class="usage-chart"></div>
        </div>

        <div class="section">
          <h2>Common Errors</h2>
          <div id="error-list" class="error-list"></div>
        </div>
      </div>

      <div id="projects" class="tab-content">
        <div class="actions">
          <button id="btn-new-project" class="btn btn-primary">New Project</button>
          <button id="btn-trigger-build" class="btn btn-secondary">Trigger Build</button>
        </div>
        <div id="projects-list" class="project-list"></div>
      </div>

      <div id="config" class="tab-content">
        <form id="config-form">
          <div class="form-group">
            <label for="github-username">GitHub Username</label>
            <input type="text" id="github-username" name="githubUsername">
          </div>

          <div class="form-group">
            <label for="selected-model">AI Model for Code Generation</label>
            <select id="selected-model" name="selectedModel">
              <option value="big-pickle">Big Pickle (Free)</option>
              <option value="deepseek-v4-flash-free">DeepSeek V4 Flash Free</option>
              <option value="mimo-v2.5-free">MiMo-V2.5 Free</option>
              <option value="north-mini-code-free">North Mini Code Free</option>
              <option value="nemotron-3-ultra-free">Nemotron 3 Ultra Free</option>
            </select>
            <small style="color: var(--text-secondary);">Model used to generate project code</small>
          </div>

          <div class="form-group">
            <label for="schedule-enabled">Enable Schedule</label>
            <input type="checkbox" id="schedule-enabled" name="scheduleEnabled">
          </div>

          <div class="form-group">
            <label for="max-projects">Max Projects Per Day</label>
            <input type="number" id="max-projects" name="maxProjectsPerDay" min="1" max="10">
          </div>

          <div class="form-group">
            <label for="require-tests">Require Tests</label>
            <input type="checkbox" id="require-tests" name="requireTests">
          </div>
          
          <div class="form-group">
            <label for="auto-merge">Auto Merge to Main</label>
            <input type="checkbox" id="auto-merge" name="autoMergeToMain">
          </div>

          <button type="submit" class="btn btn-primary">Save Configuration</button>
        </form>
      </div>

      <div id="models" class="tab-content">
        <div class="actions">
          <button id="btn-refresh-models" class="btn btn-secondary">Refresh Models</button>
          <button id="btn-clear-cache" class="btn btn-secondary" style="background: var(--error);">Clear Cache & Refresh</button>
        </div>
        <div id="models-list" class="model-list"></div>
      </div>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
