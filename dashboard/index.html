<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Project Builder</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="logo">AI</div>
        <div>
          <h1>AI Project Builder</h1>
          <p>Automated project lifecycle manager</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="btn-trigger-build" class="btn btn-primary">
          <span>+</span> Trigger Build
        </button>
      </div>
    </header>

    <nav class="nav-tabs">
      <button class="nav-tab active" data-tab="overview">Overview</button>
      <button class="nav-tab" data-tab="projects">Projects</button>
      <button class="nav-tab" data-tab="config">Configuration</button>
      <button class="nav-tab" data-tab="models">Models</button>
    </nav>

    <main id="content">
      <!-- Overview Tab -->
      <div id="overview" class="tab-content active">
        <div class="stats-grid">
          <div class="stat-card accent">
            <div class="stat-icon">+</div>
            <div class="stat-label">Total Projects</div>
            <div class="stat-value" id="stat-total">0</div>
          </div>
          <div class="stat-card success">
            <div class="stat-icon">✓</div>
            <div class="stat-label">Completed</div>
            <div class="stat-value" id="stat-completed">0</div>
          </div>
          <div class="stat-card warning">
            <div class="stat-icon">...</div>
            <div class="stat-label">In Progress</div>
            <div class="stat-value" id="stat-pending">0</div>
          </div>
          <div class="stat-card error">
            <div class="stat-icon">!</div>
            <div class="stat-label">Failed</div>
            <div class="stat-value" id="stat-failed">0</div>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
          <div class="section-card">
            <div class="section-header">
              <div class="section-title">
                <span class="icon">*</span> Recent Projects
              </div>
            </div>
            <div class="section-body">
              <div id="recent-projects" class="project-list"></div>
            </div>
          </div>

          <div class="section-card">
            <div class="section-header">
              <div class="section-title">
                <span class="icon">~</span> Live Activity
              </div>
            </div>
            <div class="section-body">
              <div id="activity-feed"></div>
            </div>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
          <div class="section-card">
            <div class="section-header">
              <div class="section-title">
                <span class="icon">^</span> API Usage (7 Days)
              </div>
            </div>
            <div class="section-body">
              <div id="api-usage"></div>
            </div>
          </div>

          <div class="section-card">
            <div class="section-header">
              <div class="section-title">
                <span class="icon">!</span> Common Errors
              </div>
            </div>
            <div class="section-body">
              <div id="error-list"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Projects Tab -->
      <div id="projects" class="tab-content">
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">All Projects</div>
            <div style="display: flex; gap: 8px;">
              <button id="btn-new-project" class="btn btn-primary btn-sm">+ New Project</button>
              <button class="btn btn-danger btn-sm" onclick="cleanupStuckProjects()">Cleanup Stuck</button>
            </div>
          </div>
          <div class="section-body">
            <div id="projects-list" class="project-list"></div>
          </div>
        </div>
      </div>

      <!-- Configuration Tab -->
      <div id="config" class="tab-content">
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">Settings</div>
          </div>
          <div class="section-body">
            <form id="config-form">
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label" for="github-username">GitHub Username</label>
                  <input type="text" id="github-username" class="form-input" placeholder="your-username">
                </div>

                <div class="form-group">
                  <label class="form-label" for="selected-model">AI Model</label>
                  <select id="selected-model" class="form-select">
                    <option value="big-pickle">Big Pickle (Free)</option>
                    <option value="deepseek-v4-flash-free">DeepSeek V4 Flash Free</option>
                    <option value="mimo-v2.5-free">MiMo-V2.5 Free</option>
                    <option value="north-mini-code-free">North Mini Code Free</option>
                    <option value="nemotron-3-ultra-free">Nemotron 3 Ultra Free</option>
                  </select>
                  <span class="form-hint">Model used for code generation</span>
                </div>

                <div class="form-group">
                  <label class="form-label" for="max-projects">Max Projects Per Day</label>
                  <input type="number" id="max-projects" class="form-input" min="1" max="10" value="3">
                </div>

                <div class="form-group">
                  <label class="form-label">Schedule</label>
                  <label class="form-checkbox-group">
                    <input type="checkbox" id="schedule-enabled" class="form-checkbox" checked>
                    <span>Enable automatic builds</span>
                  </label>
                </div>

                <div class="form-group">
                  <label class="form-label">Quality</label>
                  <label class="form-checkbox-group">
                    <input type="checkbox" id="require-tests" class="form-checkbox" checked>
                    <span>Require tests in generated code</span>
                  </label>
                </div>

                <div class="form-group">
                  <label class="form-label">Deployment</label>
                  <label class="form-checkbox-group">
                    <input type="checkbox" id="auto-merge" class="form-checkbox" checked>
                    <span>Auto merge PR to main branch</span>
                  </label>
                </div>
              </div>

              <div style="margin-top: 24px;">
                <button type="submit" class="btn btn-primary">Save Configuration</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Models Tab -->
      <div id="models" class="tab-content">
        <div class="section-card">
          <div class="section-header">
            <div class="section-title">Available Models</div>
            <div style="display: flex; gap: 8px;">
              <button id="btn-refresh-models" class="btn btn-secondary btn-sm">Refresh</button>
              <button id="btn-clear-cache" class="btn btn-danger btn-sm">Clear Cache</button>
            </div>
          </div>
          <div class="section-body">
            <div id="models-list" class="model-grid"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-container">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Details</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
